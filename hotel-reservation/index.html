<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="stylesheet.css">
</head>
<body>

    <h1>Otel otomasyonu sistemii</h1>
    <h2>Oda Ekle</h2>
    <input type="text" id="roomNo" placeholder="Oda Numarası">
    <input type="text" id="roomType" placeholder="Oda Tipi">
    <button  onclick="addRoom()">Oda Ekle</button>
    <h2>Müşteri Ekle</h2>
    <input type="text" id="customerName" placeholder="Ad">
    <input type="text" id="customerPhone" placeholder="Telefon">
    <button onclick="addCustomer()">Ekle</button>
    <h3>Rezervasyon Yap</h3>
    <input type="text" id="resCustomer" placeholder="Müşteri Adı">
    <input type="text" id="resRoom" placeholder="Oda Numarası">
    <input type="date" id="resDate">
    <button onclick="addReservation()">Rezervasyon Yap</button>
    <h3>Odalar</h3>
    <ul id="roomList"></ul>
    <h3>Müşteriler</h3>
    <ul id="customerList"></ul>
    <h3>Rezervasyonlar</h3>
    <ul id="resList"></ul>


    <script src="script.js"></script>
</body>
</html>
